<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Grid -->
  <g stroke="#3b82f6" stroke-width="0.5" opacity="0.15">
    <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400 M 0,500 L 800,500"/>
    <path d="M 100,0 L 100,600 M 200,0 L 200,600 M 300,0 L 300,600 M 400,0 L 400,600 M 500,0 L 500,600 M 600,0 L 600,600 M 700,0 L 700,600"/>
  </g>

  <!-- Decorative Glowing Orbs -->
  <circle cx="250" cy="200" r="120" fill="url(#blueGrad)" filter="url(#glow)"/>
  <circle cx="550" cy="350" r="140" fill="url(#purpleGrad)" filter="url(#glow)"/>
  <circle cx="400" cy="280" r="10" fill="#38bdf8" filter="url(#glow)"/>
  
  <!-- Central Brain / Network Node Graph -->
  <g transform="translate(250, 120)">
    <!-- Connection lines -->
    <path d="M 150,150 L 80,80 M 150,150 L 220,80 M 150,150 L 80,220 M 150,150 L 220,220 M 80,80 L 220,80 M 80,220 L 220,220 M 80,80 L 80,220 M 220,80 L 220,220" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.6"/>
    <path d="M 150,150 L 150,50 M 150,150 L 50,150 M 150,150 L 250,150 M 150,150 L 150,250" stroke="#38bdf8" stroke-width="2" opacity="0.8"/>
    
    <!-- Central Node -->
    <circle cx="150" cy="150" r="45" fill="#1e1b4b" stroke="url(#glowGrad)" stroke-width="3" filter="url(#glow)"/>
    <!-- Icon representing AI inside central node -->
    <path d="M 140,140 L 160,140 L 165,150 L 155,155 L 162,165 L 140,165 Z" fill="none" stroke="#67e8f9" stroke-width="2"/>
    <circle cx="150" cy="150" r="6" fill="#ec4899"/>

    <!-- Perimeter Nodes -->
    <circle cx="150" cy="50" r="16" fill="#2563eb" stroke="#ffffff" stroke-width="2"/>
    <circle cx="150" cy="250" r="16" fill="#7c3aed" stroke="#ffffff" stroke-width="2"/>
    <circle cx="50" cy="150" r="16" fill="#ec4899" stroke="#ffffff" stroke-width="2"/>
    <circle cx="250" cy="150" r="16" fill="#10b981" stroke="#ffffff" stroke-width="2"/>

    <!-- Small decorative node dots -->
    <circle cx="80" cy="80" r="8" fill="#38bdf8"/>
    <circle cx="220" cy="80" r="8" fill="#38bdf8"/>
    <circle cx="80" cy="220" r="8" fill="#f43f5e"/>
    <circle cx="220" cy="220" r="8" fill="#10b981"/>

    <!-- Tiny text or labels in nodes -->
    <text x="150" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">AI</text>
    <text x="50" y="154" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">GPA</text>
    <text x="250" y="154" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">JOB</text>
    <text x="150" y="254" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">FAQ</text>
  </g>

  <!-- Modern Floating Device mockup (Tablet/Screen) -->
  <g transform="translate(180, 360)">
    <!-- Device Body -->
    <rect x="0" y="0" width="440" height="200" rx="16" fill="#0f172a" stroke="#334155" stroke-width="3" opacity="0.9" filter="url(#glow)"/>
    <!-- Screen Inner -->
    <rect x="10" y="10" width="420" height="180" rx="10" fill="#1e293b"/>
    <!-- Dashboard Card Mockups inside tablet -->
    <rect x="25" y="25" width="115" height="65" rx="6" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="1"/>
    <text x="35" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#60a5fa" font-weight="bold">STUDENT ID</text>
    <text x="35" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">GPA: 3.82</text>

    <rect x="155" y="25" width="245" height="65" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
    <text x="170" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#c084fc" font-weight="bold">RECOMMENDED PROGRAMS</text>
    <text x="170" y="65" font-family="system-ui, sans-serif" font-size="12" fill="#e9d5ff">Computer Science, Software Eng.</text>

    <!-- Coding representation or text lines -->
    <rect x="25" y="105" width="375" height="15" rx="4" fill="#334155"/>
    <rect x="25" y="130" width="280" height="15" rx="4" fill="#334155"/>
    <circle cx="370" cy="138" r="8" fill="#10b981"/>
    <circle cx="390" cy="138" r="8" fill="#6366f1"/>

    <!-- Simulated UI Graph line -->
    <path d="M 25,180 Q 120,130 220,160 T 400,110" fill="none" stroke="#ec4899" stroke-width="3" filter="url(#glow)"/>
    
    <!-- Top Notch/Camera -->
    <circle cx="220" cy="5" r="3" fill="#334155"/>
  </g>

  <!-- Interactive elements: Floating Floating icons -->
  <g transform="translate(100, 240)">
    <circle cx="0" cy="0" r="30" fill="#0f172a" stroke="#2563eb" stroke-width="2" filter="url(#glow)"/>
    <!-- Book Icon -->
    <path d="M -10,-10 L 10,-10 L 10,10 L -10,10 Z M -10,-3 L 10,-3 M -10,3 L 10,3" fill="none" stroke="#60a5fa" stroke-width="2"/>
  </g>

  <g transform="translate(680, 220)">
    <circle cx="0" cy="0" r="30" fill="#0f172a" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>
    <!-- Chat Speech Icon -->
    <path d="M -12,-8 C -12,-8 -12,8 0,8 L 6,8 L 12,12 L 12,4 C 12,4 12,-8 0,-8 Z" fill="none" stroke="#c084fc" stroke-width="2"/>
  </g>

  <g transform="translate(600, 480)">
    <circle cx="0" cy="0" r="25" fill="#0f172a" stroke="#10b981" stroke-width="2" opacity="0.8"/>
    <!-- Academic Cap -->
    <path d="M -12,-4 L 0,-10 L 12,-4 L 0,2 Z M 0,2 L 0,8 M 6,0 L 6,6 C 6,9 -6,9 -6,6 L -6,0" fill="none" stroke="#34d399" stroke-width="2"/>
  </g>
</svg>
