<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="lecturerGlow" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <clipPath id="avatarClipLecturer">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
  </defs>

  <!-- Border Outline -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#lecturerGlow)" stroke-width="4"/>
  
  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="92" fill="#0f172a"/>

  <!-- Avatar elements inside clip path -->
  <g clip-path="url(#avatarClipLecturer)">
    <!-- Ambient back light -->
    <circle cx="100" cy="100" r="70" fill="#a855f7" opacity="0.25" filter="blur(10px)"/>
    
    <!-- Chest / Torso (Suited academic outfit) -->
    <path d="M 40,200 C 40,150 68,135 100,135 C 132,135 160,150 160,200 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Tie and White Shirt V-neck -->
    <polygon points="100,135 88,160 112,160" fill="#ffffff"/>
    <polygon points="96,160 104,160 102,190 98,190" fill="#ea580c"/> <!-- Tie -->
    <!-- Coat Lapels -->
    <path d="M 75,138 L 90,165 M 125,138 L 110,165" stroke="#475569" stroke-width="2"/>

    <!-- Neck -->
    <rect x="88" y="110" width="24" height="28" fill="#fed7aa"/>

    <!-- Face -->
    <circle cx="100" cy="92" r="32" fill="#fed7aa"/>

    <!-- Hair (Sleek professional hair) -->
    <path d="M 66,92 C 62,80 70,60 100,58 C 130,60 138,80 134,92 C 120,62 80,62 66,92 Z" fill="#475569"/>
    
    <!-- Glasses -->
    <circle cx="88" cy="90" r="10" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="112" cy="90" r="10" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <line x1="98" y1="90" x2="102" y2="90" stroke="#fbbf24" stroke-width="2"/>
    <line x1="78" y1="90" x2="72" y2="88" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="122" y1="90" x2="128" y2="88" stroke="#fbbf24" stroke-width="1.5"/>

    <!-- Eyes inside glasses -->
    <circle cx="88" cy="90" r="2.5" fill="#1e293b"/>
    <circle cx="112" cy="90" r="2.5" fill="#1e293b"/>

    <!-- Eyebrows -->
    <path d="M 80,78 Q 88,75 96,79" fill="none" stroke="#475569" stroke-width="2"/>
    <path d="M 104,78 Q 112,75 120,79" fill="none" stroke="#475569" stroke-width="2"/>

    <!-- Friendly smile -->
    <path d="M 94,106 Q 100,112 106,106" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
