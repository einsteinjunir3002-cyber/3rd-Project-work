<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="studentGlow" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
  </defs>

  <!-- Border Outline -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#studentGlow)" stroke-width="4"/>
  
  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="92" fill="#1e1b4b"/>

  <!-- Avatar elements inside clip path -->
  <g clip-path="url(#avatarClip)">
    <!-- Ambient back light -->
    <circle cx="100" cy="100" r="70" fill="#3b82f6" opacity="0.3" filter="blur(10px)"/>
    
    <!-- Chest / Torso (Yellow hoodie) -->
    <path d="M 40,200 C 40,150 70,130 100,130 C 130,130 160,150 160,200 Z" fill="#eab308" stroke="#ca8a04" stroke-width="2"/>
    <path d="M 100,130 L 100,165 M 85,150 L 100,165 L 115,150" fill="none" stroke="#ca8a04" stroke-width="2"/>

    <!-- Neck -->
    <rect x="88" y="105" width="24" height="30" rx="4" fill="#ffedd5"/>

    <!-- Face -->
    <circle cx="100" cy="90" r="32" fill="#ffedd5"/>

    <!-- Hair (Black curly short hair) -->
    <path d="M 68,90 Q 64,65 100,58 Q 136,65 132,90 Q 138,92 132,100 C 120,55 80,55 68,100 Q 62,92 68,90 Z" fill="#1e293b"/>
    <circle cx="70" cy="80" r="6" fill="#1e293b"/>
    <circle cx="130" cy="80" r="6" fill="#1e293b"/>
    <circle cx="100" cy="62" r="10" fill="#1e293b"/>

    <!-- Eyes -->
    <circle cx="90" cy="88" r="3" fill="#1e293b"/>
    <circle cx="110" cy="88" r="3" fill="#1e293b"/>
    <path d="M 86,82 Q 90,80 94,82" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M 106,82 Q 110,80 114,82" fill="none" stroke="#1e293b" stroke-width="1.5"/>

    <!-- Smile -->
    <path d="M 92,102 Q 100,110 108,102" fill="none" stroke="#e11d48" stroke-width="2" stroke-linecap="round"/>

    <!-- Mini Graduation Cap angled -->
    <g transform="translate(100, 50) rotate(-15)">
      <polygon points="-30,0 0,-12 30,0 0,12" fill="#0f172a" stroke="#ffffff" stroke-width="1.5"/>
      <rect x="-10" y="5" width="20" height="8" fill="#1e293b"/>
      <!-- Tassel -->
      <path d="M 0,-3 L 25,6 L 27,18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <circle cx="27" cy="20" r="2.5" fill="#fbbf24"/>
    </g>
  </g>
</svg>
