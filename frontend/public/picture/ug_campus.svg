<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ugAccent" x1="0" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#sky)"/>
  
  <!-- Clouds & Moon -->
  <circle cx="340" cy="50" r="25" fill="#f8fafc" opacity="0.1"/>
  <circle cx="80" cy="80" r="20" fill="#f8fafc" opacity="0.05"/>
  <circle cx="100" cy="85" r="15" fill="#f8fafc" opacity="0.05"/>

  <!-- Ground / Hills -->
  <path d="M 0,250 L 0,220 Q 100,200 200,220 T 400,200 L 400,250 Z" fill="#0f172a"/>
  <path d="M 0,250 L 0,235 Q 150,220 280,240 T 400,230 L 400,250 Z" fill="#1e293b" opacity="0.7"/>

  <!-- University of Ghana Iconic Tower Structure -->
  <g transform="translate(160, 40)">
    <!-- Main Tower Body -->
    <rect x="25" y="40" width="30" height="130" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="160" width="40" height="20" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
    
    <!-- Red/Orange Tile Roof (Ghanaian style) -->
    <polygon points="20,40 40,15 60,40" fill="#ea580c"/>
    <polygon points="15,160 40,145 65,160" fill="#ea580c"/>

    <!-- Tower Clock and Windows -->
    <circle cx="40" cy="65" r="6" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
    <rect x="37" y="85" width="6" height="15" rx="3" fill="#1e293b"/>
    <rect x="37" y="110" width="6" height="15" rx="3" fill="#1e293b"/>
    <rect x="37" y="135" width="6" height="15" rx="3" fill="#1e293b"/>

    <!-- Side buildings wings -->
    <rect x="-40" y="110" width="65" height="60" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <polygon points="-45,110 -10,95 25,110" fill="#ea580c"/>
    <!-- Wing windows -->
    <rect x="-30" y="125" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="-15" y="125" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="0" y="125" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="-30" y="145" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="-15" y="145" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="0" y="145" width="8" height="12" rx="1" fill="#1e293b"/>

    <!-- Right Wing -->
    <rect x="55" y="110" width="65" height="60" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <polygon points="50,110 85,95 125,110" fill="#ea580c"/>
    <!-- Right Wing Windows -->
    <rect x="65" y="125" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="80" y="125" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="95" y="125" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="65" y="145" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="80" y="145" width="8" height="12" rx="1" fill="#1e293b"/>
    <rect x="95" y="145" width="8" height="12" rx="1" fill="#1e293b"/>
  </g>

  <!-- Trees / Foliage -->
  <circle cx="80" cy="210" r="18" fill="#047857"/>
  <circle cx="95" cy="205" r="22" fill="#065f46"/>
  <circle cx="115" cy="215" r="15" fill="#047857"/>

  <circle cx="295" cy="210" r="20" fill="#065f46"/>
  <circle cx="315" cy="215" r="15" fill="#047857"/>

  <!-- Gold/Navy UG crest representation -->
  <rect x="15" y="15" width="65" height="30" rx="4" fill="#0f172a" stroke="#d97706" stroke-width="1.5"/>
  <text x="47" y="34" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b" font-weight="bold" text-anchor="middle">UG - LEGON</text>
</svg>
