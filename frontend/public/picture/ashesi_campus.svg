<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="hillSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="ashesiRed" x1="0" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#hillSky)"/>

  <!-- Hill top curves (Berekuso Hills) -->
  <path d="M 0,250 Q 150,140 400,200 L 400,250 Z" fill="#064e3b" opacity="0.6"/>
  <path d="M 0,250 Q 80,180 320,220 L 400,250 Z" fill="#022c22"/>

  <!-- Ashesi Hilltop Campus Buildings -->
  <g transform="translate(100, 110)">
    <!-- Red Brick Walls (Ashesi Trademark) -->
    <rect x="40" y="30" width="140" height="70" fill="url(#ashesiRed)" stroke="#7f1d1d" stroke-width="1.5"/>
    <!-- Courtyard arch center -->
    <path d="M 90,100 L 90,65 A 20,20 0 0,1 130,65 L 130,100 Z" fill="#022c22" stroke="#7f1d1d" stroke-width="1.5"/>
    
    <!-- Solar Panels on roof (Ashesi sustainable identity) -->
    <polygon points="30,30 110,5 190,30" fill="#1e293b"/>
    <!-- Solar Grid lines -->
    <line x1="110" y1="5" x2="110" y2="30" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="70" y1="18" x2="150" y2="18" stroke="#38bdf8" stroke-width="1"/>
    <line x1="50" y1="24" x2="170" y2="24" stroke="#38bdf8" stroke-width="1"/>

    <!-- Small side pavilion -->
    <rect x="-10" y="55" width="40" height="45" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
    <polygon points="-15,55 10,40 35,55" fill="#991b1b"/>
    <rect x="2" y="65" width="16" height="35" rx="2" fill="#1e293b"/>

    <!-- Windows -->
    <rect x="55" y="45" width="12" height="15" rx="1" fill="#fef08a"/>
    <rect x="155" y="45" width="12" height="15" rx="1" fill="#fef08a"/>
    <rect x="55" y="70" width="12" height="15" rx="1" fill="#1e293b"/>
    <rect x="155" y="70" width="12" height="15" rx="1" fill="#1e293b"/>
  </g>

  <!-- Stars in hill sky -->
  <circle cx="50" cy="40" r="1.5" fill="#fff"/>
  <circle cx="120" cy="30" r="1" fill="#fff"/>
  <circle cx="280" cy="50" r="2" fill="#fff"/>
  <circle cx="340" cy="70" r="1" fill="#fff"/>

  <!-- Ashesi Tag -->
  <rect x="15" y="15" width="70" height="30" rx="4" fill="#7f1d1d" stroke="#fef08a" stroke-width="1.5"/>
  <text x="50" y="34" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" font-weight="bold" text-anchor="middle">ASHESI</text>
</svg>
