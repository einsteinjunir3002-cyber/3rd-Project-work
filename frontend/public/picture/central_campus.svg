<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="cuSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cuPillars" x1="0" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#cuSky)"/>

  <!-- Stars -->
  <circle cx="80" cy="50" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="280" cy="30" r="1.5" fill="#fff" opacity="0.6"/>

  <!-- Hill outline -->
  <path d="M 0,250 Q 200,160 400,220 L 400,250 Z" fill="#14532d"/>

  <!-- Main Gate & Pillars Structure -->
  <g transform="translate(60, 80)">
    <!-- Base -->
    <rect x="10" y="120" width="260" height="15" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>

    <!-- Central Grand Entrance Arch -->
    <path d="M 80,120 L 80,60 A 60,60 0 0,1 200,60 L 200,120 Z" fill="none" stroke="url(#cuPillars)" stroke-width="8"/>
    <path d="M 95,120 L 95,70 A 45,45 0 0,1 185,70 L 185,120 Z" fill="#020617" opacity="0.5"/>

    <!-- Classical pillars supporting crossbar -->
    <rect x="25" y="45" width="20" height="75" fill="url(#cuPillars)" stroke="#94a3b8" stroke-width="1"/>
    <rect x="235" y="45" width="20" height="75" fill="url(#cuPillars)" stroke="#94a3b8" stroke-width="1"/>

    <!-- Crossbar / Roof cap -->
    <rect x="15" y="30" width="250" height="15" fill="#0f766e" stroke="#1e293b" stroke-width="2"/>
    <polygon points="10,30 140,5 270,30" fill="#0d9488"/>

    <!-- Small decorative cross/crest symbol in arch center -->
    <circle cx="140" cy="65" r="12" fill="#d97706"/>
    <path d="M 140,57 L 140,73 M 132,65 L 148,65" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Trees -->
  <circle cx="45" cy="205" r="18" fill="#166534"/>
  <circle cx="340" cy="210" r="20" fill="#15803d"/>
  <circle cx="360" cy="205" r="15" fill="#166534"/>

  <!-- CU Tag -->
  <rect x="15" y="15" width="70" height="30" rx="4" fill="#0f766e" stroke="#ffffff" stroke-width="1.5"/>
  <text x="50" y="34" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" font-weight="bold" text-anchor="middle">CENTRAL</text>
</svg>
