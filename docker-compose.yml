version: '3.8'

services:
  # 1. MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: smartlearn-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - smartlearn-network

  # 2. Node.js Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartlearn-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/smartlearn
      - JWT_SECRET=supersecretjwtkey1234567890!
      - UPLOAD_STORAGE=local
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - smartlearn-network

  # 3. React Frontend Service (Serving built files statically via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartlearn-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smartlearn-network

volumes:
  mongodata:

networks:
  smartlearn-network:
    driver: bridge
