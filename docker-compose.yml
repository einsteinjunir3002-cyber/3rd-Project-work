version: '3.8'

services:
  # 1. PostgreSQL Database Service
  postgres:
    image: postgres:15
    container_name: smartlearn-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartlearn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - smartlearn-network

  # 2. Node.js Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartlearn-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/smartlearn
      - JWT_SECRET=supersecretjwtkey1234567890!
      - UPLOAD_STORAGE=local
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - smartlearn-network

  # 3. React Frontend Service (Serving built files statically via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartlearn-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smartlearn-network

volumes:
  pgdata:

networks:
  smartlearn-network:
    driver: bridge
